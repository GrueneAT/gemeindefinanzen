# Deployt die Browser-App (Verzeichnis web/) auf GitHub Pages.
# Die Seite ist statisch und ohne Build-Schritt — der Workflow laedt das
# Verzeichnis web/ unveraendert als Pages-Artefakt hoch.
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Laufende Deployments nicht abbrechen, neue reihen sich ein.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: web/ als Artefakt hochladen
        uses: actions/upload-pages-artifact@v5
        with:
          path: web

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v5
